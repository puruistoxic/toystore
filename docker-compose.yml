version: '3.8'

services:
  wainso-web:
    build: .
    container_name: wainso-web
    restart: always
    environment:
      - NODE_ENV=production
    # Logs are sent to stdout/stderr and captured by docker logs
    # volumes:
    #   - ./logs:/var/log/nginx
    networks:
      - nginx_proxy
    labels:
      - "nginx.proxy=true"
      - "nginx.proxy.domain=wainso.com"
      - "nginx.proxy.redirects=www.wainso.com:https://wainso.com"
    expose:
      - "80"
    # Add health check for better reliability
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  nginx_proxy:
    external: true

services:
  toystore-api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: toystore-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    networks:
      - nginx_proxy
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  toystore-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
        REACT_APP_TIMEZONE: ${REACT_APP_TIMEZONE:-Asia/Kolkata}
        REACT_APP_TINYMCE_API_KEY: ${REACT_APP_TINYMCE_API_KEY:-}
        REACT_APP_GOOGLE_ANALYTICS_ID: ${REACT_APP_GOOGLE_ANALYTICS_ID:-}
    container_name: toystore-web
    restart: unless-stopped
    networks:
      - nginx_proxy
    labels:
      - "nginx.proxy=true"
      - "nginx.proxy.domain=${PUBLIC_DOMAIN:-toystore.purushottam.dev}"
      - "nginx.proxy.redirects=${NGINX_PROXY_REDIRECTS:-www.toystore.purushottam.dev:https://toystore.purushottam.dev}"
    expose:
      - "80"
    depends_on:
      toystore-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  nginx_proxy:
    external: true
